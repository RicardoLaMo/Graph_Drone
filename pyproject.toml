[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "graph-drone"
version = "1.0.0-gora"
description = "A Multi-View Mixture-of-Experts Meta-Model for Tabular Data."
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "RicardoLaMo", email = "the.richard.liu@gmail.com" }
]
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "tabpfn>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black",
    "isort",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["graphdrone_fit*"]
